<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Bot Mapeeiro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <main class="login-wrapper">
    <section class="login-card">
      <div class="logo" style="justify-content:center; margin-bottom: 18px;">
        <div class="logo-icon">🗺️</div>
        <div>
          <h1>Bot Mapeeiro</h1>
          <p>Acesso ao sistema</p>
        </div>
      </div>

      <h2>Entrar</h2>
      <p class="login-subtitle">Use seu usuário e senha para continuar.</p>

      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input id="username" name="username" type="text" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary" id="btn-login" type="submit">Entrar</button>
      </form>

      <p id="login-error" class="login-error"></p>
    </section>
  </main>

  <script>
    async function checkAuth() {
      try {
        const res = await fetch('/api/auth-status');
        const data = await res.json();
        if (data.authenticated) {
          window.location.href = '/';
        }
      } catch (err) {
        // keep user on login
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errorEl = document.getElementById('login-error');
      errorEl.textContent = '';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Entrando...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok || !data.success) {
          errorEl.textContent = data.error || 'Falha ao autenticar';
          btn.disabled = false;
          btn.textContent = 'Entrar';
          return;
        }

        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = 'Erro de conexão. Tente novamente.';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });

    checkAuth();
  </script>
</body>
</html>
